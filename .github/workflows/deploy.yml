name: deploy
on:
  push:
    branches: ["**"]
  workflow_dispatch:

# Deploys the built `dist/` to Cloudflare Pages using `wrangler pages deploy`.
# Pushes to `main` create a production deployment; pushes to any other branch
# create a Pages preview deployment under that branch's name.
#
# Configure two repository secrets before the first run:
#   CLOUDFLARE_API_TOKEN  — a token scoped to Pages:Edit
#   CLOUDFLARE_ACCOUNT_ID — the Cloudflare account id that owns the Pages project
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Cloudflare Pages branch names must be <=28 chars, lowercase,
      # alphanumerics and single hyphens. Sanitize the Git ref so that
      # branches like `copilot/create-foo` still get a preview deploy.
      - name: Compute Pages branch name
        id: pages_branch
        run: |
          raw='${{ github.ref_name }}'
          clean=$(printf '%s' "$raw" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g' \
            | cut -c1-28 \
            | sed -E 's/-+$//')
          [ -z "$clean" ] && clean=preview
          echo "name=$clean" >> "$GITHUB_OUTPUT"
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # On `main` this produces a production deployment; on every other
          # branch Cloudflare scopes it to a preview URL
          # (e.g. https://<branch>.obr-tht.pages.dev).
          command: pages deploy dist --project-name=obr-tht --branch=${{ steps.pages_branch.outputs.name }}

