name: deploy
on:
  push:
    branches: ["**"]
  workflow_dispatch:

# Deploys the built `dist/` to Cloudflare Workers static assets.
# Pushes to `main` update the production Worker; pushes to any other branch
# upload a preview version under a sanitized preview alias.
#
# Configure two repository secrets before the first run:
#   CLOUDFLARE_API_TOKEN  — a token scoped to Edit Cloudflare Workers
#   CLOUDFLARE_ACCOUNT_ID — the Cloudflare account id that owns the Worker
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      # Workers preview aliases must be lowercase, begin with a letter,
      # only contain letters/numbers/hyphens, and keep the combined
      # `<alias>-obr-tht` DNS label within 63 characters, hence the 55-char cap.
      - name: Compute Workers preview alias
        id: preview_alias
        if: github.ref != 'refs/heads/main'
        run: |
          raw='${{ github.ref_name }}'
          clean=$(printf '%s' "$raw" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+|-+$//g')
          case "$clean" in
            "") clean=preview ;;
            [a-z]*) ;;
            *) clean="preview-$clean" ;;
          esac
          clean=$(printf '%s' "$clean" \
            | cut -c1-55 \
            | sed -E 's/-+$//')
          [ -z "$clean" ] && clean=preview
          echo "name=$clean" >> "$GITHUB_OUTPUT"
      - name: Deploy production Worker
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
      - name: Upload preview Worker version
        if: github.ref != 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --preview-alias=${{ steps.preview_alias.outputs.name }}
