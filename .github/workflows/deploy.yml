name: deploy
on:
  push:
    branches: ["**"]
  workflow_dispatch:

# Deploys the built `dist/` to Cloudflare Pages using `wrangler pages deploy`.
# Pushes to `main` create a production deployment; pushes to any other branch
# create a Pages preview deployment under that branch's name.
#
# Configure two repository secrets before the first run:
#   CLOUDFLARE_API_TOKEN  — a token scoped to Pages:Edit
#   CLOUDFLARE_ACCOUNT_ID — the Cloudflare account id that owns the Pages project
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # GITHUB_REF_NAME is the branch name; Cloudflare uses it to scope
          # the preview URL (e.g. https://<branch>.obr-tht.pages.dev).
          command: pages deploy dist --project-name=obr-tht --branch=${{ github.ref_name }}

